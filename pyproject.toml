[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "geny-executor"
version = "0.1.0"
description = "Harness-engineered agent pipeline library using Anthropic API"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.52.0",
    "mcp>=1.0.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
memory = [
    "numpy>=1.24",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.4.0",
]
all = [
    "geny-executor[memory]",
]

[tool.hatch.build.targets.wheel]
packages = ["src/geny_executor"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
